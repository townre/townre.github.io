<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TXT Reader v0.3 & Azure TTS</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111111" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <link rel="apple-touch-icon" href="icon.svg">
    <!-- Prevent FOUC (Flash of Unstyled Content) by applying theme before anything renders -->
    <script>
        const savedTheme = localStorage.getItem('tts_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        if (savedTheme === 'light') {
            document.documentElement.style.backgroundColor = '#ffffff';
        } else {
            document.documentElement.style.backgroundColor = '#000000';
        }
    </script>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,500;1,400&family=Noto+Sans+SC:wght@400;500&family=Noto+Serif+SC:wght@400;500&family=Ma+Shan+Zheng&display=swap"
        rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body>
    <header class="app-header">
        <div class="header-left">
            <h1>Reader</h1>
            <label for="file-upload" class="btn btn-primary" title="Load TXT file">
                <i class="ph ph-folder-open"></i> Load
            </label>
            <input id="file-upload" type="file" accept=".txt" style="display: none;" />
            <span id="file-name" class="file-name">No file loaded</span>
        </div>
        <div class="header-right">
            <button id="toc-toggle" class="icon-btn" title="Table of Contents">
                <i class="ph ph-list"></i>
            </button>
            <button id="mode-toggle" class="icon-btn" title="Toggle Page Mode">
                <i class="ph ph-book-open"></i>
            </button>
            <button id="theme-toggle" class="icon-btn" title="Toggle Theme">
                <i class="ph ph-moon"></i>
            </button>
            <button id="settings-btn" class="icon-btn" title="Settings">
                <i class="ph ph-gear"></i>
            </button>
        </div>
    </header>

    <!-- Page Turning Overlay Zones -->
    <div id="page-zone-left" class="page-zone left hidden" title="Previous Page"></div>
    <div id="page-zone-right" class="page-zone right hidden" title="Next Page"></div>

    <main class="app-main">
        <div id="text-container" class="text-container">
            <div class="empty-state">
                <i class="ph ph-book-open"></i>
                <p>Load a text file to start reading</p>
            </div>
        </div>
    </main>

    <!-- Table of Contents Slide-in Panel -->
    <aside id="toc-panel" class="toc-panel glass">
        <div class="toc-header">
            <h2>Table of Contents</h2>
            <button id="close-toc" class="icon-btn"><i class="ph ph-x"></i></button>
        </div>
        <div id="toc-list" class="toc-list">
            <div class="toc-empty">No chapters detected</div>
        </div>
    </aside>

    <div class="bottom-controller glass">
        <div class="controller-inner">
            <div class="controls-left">
                <button id="btn-focus" class="icon-btn" title="Focus on active sentence">
                    <i class="ph ph-crosshair"></i>
                </button>
            </div>
            <div class="controls-center">
                <button id="btn-prev" class="icon-btn large" title="Previous sentence">
                    <i class="ph ph-caret-line-left"></i>
                </button>
                <button id="btn-play-pause" class="icon-btn x-large play-btn" title="Play">
                    <i class="ph ph-play-circle"></i>
                </button>
                <button id="btn-next" class="icon-btn large" title="Next sentence">
                    <i class="ph ph-caret-line-right"></i>
                </button>
            </div>
            <div class="controls-right">
                <div class="select-group">
                    <i class="ph ph-user-sound"></i>
                    <select id="voice-select" title="Select Voice">
                        <option value="">No voices available (Check settings)</option>
                    </select>
                </div>
                <div class="select-group">
                    <i class="ph ph-gauge"></i>
                    <select id="speed-select" title="Playback Speed">
                        <option value="0.5">0.5x</option>
                        <option value="0.75">0.75x</option>
                        <option value="1">1.0x</option>
                        <option value="1.25">1.25x</option>
                        <option value="1.5">1.5x</option>
                        <option value="2">2.0x</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal-backdrop hidden">
        <div class="modal glass">
            <div class="modal-header">
                <h2>Azure TTS Settings</h2>
                <button id="close-settings" class="icon-btn"><i class="ph ph-x"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="azure-key">Subscription Key</label>
                    <input type="password" id="azure-key" placeholder="Enter Azure Key" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="azure-region">Region</label>
                    <input type="text" id="azure-region" placeholder="e.g. eastus" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="max-chars">Max Characters per Audio Chunk</label>
                    <input type="number" id="max-chars" min="50" max="1000" step="10" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="font-family">Font Family</label>
                    <select id="font-family">
                        <option value="'Lora', Georgia, serif">Lora (Serif)</option>
                        <option value="'Inter', system-ui, sans-serif">Inter (Sans-Serif)</option>
                        <option value="'Roboto', system-ui, sans-serif">Roboto (Sans-Serif)</option>
                        <option value="'Noto Serif SC', serif">Noto Serif SC (Mingti/Serif)</option>
                        <option value="'Noto Sans SC', sans-serif">Noto Sans SC (Heiti/Sans)</option>
                        <option value="'Microsoft YaHei', '微软雅黑', sans-serif">Microsoft YaHei</option>
                        <option value="'Ma Shan Zheng', cursive">Ma Shan Zheng (Brush)</option>
                        <option value="Georgia, serif">Georgia (Serif)</option>
                        <option value="Verdana, sans-serif">Verdana (Sans-Serif)</option>
                        <option value="system-ui, sans-serif">System Default</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="sentence-gap">Natural Sentence Gap: <span id="sentence-gap-value">0.3</span>s</label>
                    <input type="range" id="sentence-gap" min="0" max="2" step="0.1" value="0.3">
                </div>
                <div class="settings-actions">
                    <button id="clear-cache-btn" class="btn btn-secondary full-width">
                        <i class="ph ph-trash"></i> Clear Audio Cache (<span id="cache-size">0</span> items)
                    </button>
                    <button id="save-settings" class="btn btn-primary full-width">Save Settings</button>
                </div>
                <p class="settings-hint">You need an active Azure Cognitive Services speech resource to use TTS.</p>
            </div>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="toast-container"></div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('ServiceWorker registered:', reg.scope))
                    .catch(err => console.log('ServiceWorker registration failed:', err));
            });
        }
    </script>
</body>

</html>
